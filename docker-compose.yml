# TexTrans 一键部署:nginx 入口 + 前端 + 后端
#
# 用法:
#   cp .env.example .env   # 填入 KIMI_API_KEY
#   docker compose up -d --build
#   浏览器打开 http://<服务器IP>/     (nginx 默认 80 端口)
#
# 服务器部署:改 nginx ports 到你要的端口(如 "8080:80"),或在前面再挂一层带 HTTPS 的网关。

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      TEXTRANS_WORKDIR: /data/workdir
    volumes:
      - ./data:/data          # 翻译产物 + 缓存持久化到宿主
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./dochero-ai
    environment:
      # 前端 rewrites 的服务端代理目标(容器网络内用服务名)
      TEXTRANS_API_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"               # 对外唯一入口;服务器上可改成 "8080:80"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
