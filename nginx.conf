# TexTrans nginx 反向代理:单一入口,统一路由前后端 + 正确代理 WebSocket
# 浏览器只访问本 nginx(默认 80 端口):
#   /            → 前端 (Next.js standalone)
#   /api/*       → 后端 (FastAPI)
#   /ws/*        → 后端 WebSocket(带 Upgrade 头)

upstream backend {
    server backend:8000;
}
upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # 上传大文件(tex 源码包)放宽限制
    client_max_body_size 100m;

    # WebSocket:进度推送。必须带 Upgrade/Connection 头。
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # 长连接,别过早断
        proxy_send_timeout 3600s;
    }

    # 后端 REST
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;    # 翻译/编译可能较久
    }

    # 前端(其余全部)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
